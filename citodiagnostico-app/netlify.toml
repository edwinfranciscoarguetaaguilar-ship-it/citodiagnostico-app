[build]
  command = "npm run build"
  publish = "build"

[[redirects]]
  from = "/api"
  to = "https://script.google.com/macros/s/AKfycbzLGvHKoMCCSZ3Ae55exIZaoxtAHIWH9ihizmH9l-DEISgxpDbIP0ZdVEdqZhYbypv4/exec"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "https://script.google.com/macros/s/AKfycbzLGvHKoMCCSZ3Ae55exIZaoxtAHIWH9ihizmH9l-DEISgxpDbIP0ZdVEdqZhYbypv4/exec/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
